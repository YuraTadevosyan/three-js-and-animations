    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05030d" />
    <meta
      name="description"
      content="Audio-reactive music visualizer with real-time FFT analysis, GLSL wave-distortion shaders, particle aura, and beat-synced camera."
    />
    <title>Music Visualizer</title>
    <script>
      // Resolve theme synchronously to avoid a flash of wrong theme on load.
      (function () {
        try {
          var stored = localStorage.getItem('mv-theme');
          var dark =
            stored === 'dark' ||
            (!stored &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    <script type="module" crossorigin src="/three-js-and-animations/music-visualizer/assets/index-CD7HJxEW.js"></script>
